version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: bulk-color-tool:latest
    container_name: bulk-color-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override default paths for Docker named volume
      - UPLOAD_DIR=/app/data/uploads
      - PREVIEW_DIR=/app/data/previews
      - RESULT_DIR=/app/data/results
      - PRESETS_PATH=/app/data/presets.json
    volumes:
      - bulk_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bulk_data:
    name: bulk_color_data
